<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hệ thống cảnh báo ngập lụt</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
  text-align:center;
}

.header{
  padding:20px;
  background:#1e293b;
  font-size:28px;
  font-weight:bold;
}

.grid{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:30px;
  flex-wrap:wrap;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  width:260px;
}

#riverBox{
  width:150px;
  height:350px;
  border:3px solid white;
  margin:auto;
  position:relative;
}

#water{
  position:absolute;
  bottom:0;
  width:100%;
  background:linear-gradient(to top,#2563eb,#60a5fa);
  height:0%;
  transition:0.5s;
}

.status{
  font-size:22px;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
}

.safe{background:#16a34a;}
.warning{background:#facc15;color:black;}
.danger{background:#dc2626;animation:blink 1s infinite;}

@keyframes blink{
  50%{opacity:0.5;}
}

.valueBig{
  font-size:32px;
  margin:10px 0;
}

canvas{
  max-width:900px;
  margin-top:40px;
}
</style>
</head>

<body>

<div class="header">
🌊 HỆ THỐNG CẢNH BÁO NGẬP LỤT
</div>

<div class="grid">

<div class="card">
<h2>Mực nước</h2>
<div id="riverBox">
<div id="water"></div>
</div>
<div class="valueBig" id="waterValue">0 cm</div>
</div>

<div class="card">
<h2>Trạng thái</h2>
<div id="statusBox" class="status safe">AN TOÀN</div>
<h3>Giá trị ADC: <span id="adcValue">0</span></h3>
</div>

</div>

<canvas id="chart"></canvas>

<script>

const TOKEN = "rdP1f15mGDbn17U9FV0ITcGh6XNTmMol";

// ===== BIỂU ĐỒ =====
let ctx = document.getElementById('chart').getContext('2d');

let chart = new Chart(ctx,{
  type:'line',
  data:{
    labels:[],
    datasets:[{
      label:'Mực nước (cm)',
      data:[],
      borderColor:'#3b82f6',
      borderWidth:3,
      fill:false,
      tension:0.3
    }]
  },
  options:{
    responsive:true,
    scales:{
      y:{min:0,max:10}
    }
  }
});

// ===== HÀM LẤY DATA AN TOÀN =====
async function getBlynk(pin){
  let res = await fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&${pin}`);
  let text = await res.text();

  if(text.includes("Invalid token")){
    throw new Error("Token không hợp lệ");
  }

  try{
    let parsed = JSON.parse(text);
    return parsed[0];
  }catch{
    return text;
  }
}

// ===== FETCH =====
async function updateData(){

  try{

    let adc = parseInt(await getBlynk("V0"));
    let cm  = parseFloat(await getBlynk("V1"));
    let st  = parseInt(await getBlynk("V2"));

    if(isNaN(adc) || isNaN(cm) || isNaN(st)) return;

    document.getElementById("adcValue").innerText = adc;
    document.getElementById("waterValue").innerText = cm.toFixed(2) + " cm";

    // Tính % nước
    let percent = (cm / 10) * 100;
    percent = Math.max(0, Math.min(100, percent));
    document.getElementById("water").style.height = percent + "%";

    let statusBox = document.getElementById("statusBox");
    statusBox.className = "status";

    if(st === 0){
      statusBox.innerText = "AN TOÀN";
      statusBox.classList.add("safe");
    }
    else if(st === 1){
      statusBox.innerText = "CẢNH BÁO";
      statusBox.classList.add("warning");
    }
    else{
      statusBox.innerText = "RẤT NGUY HIỂM";
      statusBox.classList.add("danger");
    }

    let time = new Date().toLocaleTimeString();

    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(cm);

    if(chart.data.labels.length > 20){
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
    }

    chart.update();

  }catch(error){
    console.log("Lỗi:", error.message);
    document.getElementById("statusBox").innerText="MẤT KẾT NỐI";
    document.getElementById("statusBox").className="status danger";
  }
}

setInterval(updateData,1000);
updateData();

</script>

</body>
</html>
